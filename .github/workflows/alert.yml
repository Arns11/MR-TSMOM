name: Combo Alert

on:
  schedule:
    # Heure d'ete US (mars-octobre) : 16:00 ET close + 1h = 21:00 UTC
    - cron: '0 21 * 3-10 1-5'
    # Heure d'hiver US (novembre-fevrier) : 16:00 ET close + 1h = 22:00 UTC
    - cron: '0 22 * 11,12,1,2 1-5'
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib yfinance

      - name: Update data (refresh recent)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/download_data.py --refresh-only-recent

      - name: Send alert email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          SUBSCRIBER_CURRENCY: ${{ secrets.SUBSCRIBER_CURRENCY }}
        run: python scripts/alert_email.py
